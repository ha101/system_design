<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Org Architecture — Factoring Co</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap');
:root {
  --bg:#0b0b12;--s1:#13131c;--s2:#1c1c28;
  --b1:#24243a;--b2:#36364e;
  --t1:#e0e0ea;--t2:#8e8ea8;--t3:#50506e;
  --teal:#1D9E75;--tl:#0e3028;--th:#5DCAA5;
  --purple:#7F77DD;--pl:#1e1840;--ph:#AFA9EC;
  --coral:#D85A30;--cl:#2c1810;--ch:#F0997B;
  --amber:#BA7517;--ah:#FAC775;
  --green:#639922;--gnl:#152e08;--gnh:#97C459;
  --gl:#1a1a26;--gm:#40405a;--gh:#9898aa;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t1);font-family:'Outfit',sans-serif;height:100vh;width:100vw;overflow:hidden;display:flex;flex-direction:column}
.grid{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.18;
  background-image:linear-gradient(rgba(100,100,140,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(100,100,140,.06) 1px,transparent 1px);background-size:48px 48px}

/* Header */
header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;border-bottom:1px solid var(--b1);background:rgba(11,11,18,.95);flex-shrink:0;backdrop-filter:blur(8px)}
header h1{font-size:13px;font-weight:500;letter-spacing:-.01em}
header h1 span{color:var(--t3);font-weight:400}
.hgroup{display:flex;gap:2px;align-items:center}
.tog{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 8px 3px 6px;border-radius:5px;
  border:1px solid transparent;background:0;color:var(--t3);cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:4px;user-select:none}
.tog:hover{background:var(--s2);color:var(--t2)}
.tog .d{width:6px;height:6px;border-radius:50%;opacity:.3;transition:opacity .15s}
.tog.on{color:var(--t1);background:var(--s2)}
.tog.on .d{opacity:1}
.tog .k{font-size:8px;color:var(--t3);margin-left:1px;opacity:.5}
.sep{width:1px;height:16px;background:var(--b1);margin:0 4px}
.hbtn{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 10px;border-radius:5px;
  border:1px solid var(--b1);background:0;color:var(--t2);cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:4px}
.hbtn:hover{background:var(--s2);color:var(--t1)}
.hbtn.active{background:var(--gnl);color:var(--gnh);border-color:var(--green)}
.hbtn.primary{border-color:var(--green);color:var(--gnh)}
.hbtn.primary:hover{background:var(--green);color:#fff}
.hbtn.danger:hover{background:var(--cl);color:var(--ch);border-color:var(--coral)}
.hbtn svg{width:12px;height:12px}
.mode-label{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-right:4px}

/* Canvas */
#canvas-wrap{flex:1;position:relative;overflow:hidden;cursor:default}
#canvas-wrap.editing{cursor:default}
#canvas-wrap.editing .node-g{cursor:grab}
#canvas-wrap.editing .node-g:active{cursor:grabbing}
#canvas-wrap.panning{cursor:grabbing}
#canvas{width:100%;height:100%}
#canvas text{font-family:'IBM Plex Mono',monospace}

/* Layers */
.lay{transition:opacity .3s ease}
.lay.off{opacity:0;pointer-events:none}
.zbg{transition:opacity .3s ease}
.zbg.off{opacity:0}
@keyframes fr{to{stroke-dashoffset:-24}}
@keyframes fu{to{stroke-dashoffset:-16}}
.ar{stroke-dasharray:8 6;animation:fr 1.2s linear infinite}
.au{stroke-dasharray:5 4;animation:fu 1.6s linear infinite}

/* Node hover/selection */
.node-g{transition:filter .15s}
#canvas-wrap.editing .node-g:hover rect:first-child{stroke-width:1.2;filter:brightness(1.15)}
.node-g.selected rect:first-child{stroke:var(--green)!important;stroke-width:2!important}
@keyframes march{to{stroke-dashoffset:-12}}
.node-g.selected .sel-border{stroke-dasharray:4 2;animation:march .4s linear infinite;opacity:1}
.conn-g.selected line:nth-child(2){stroke-width:3!important}

/* Side panel */
#panel{position:absolute;right:0;top:0;bottom:0;width:280px;background:var(--s1);border-left:1px solid var(--b1);
  z-index:15;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow-y:auto;font-family:'IBM Plex Mono',monospace;font-size:11px}
#panel.open{transform:translateX(0)}
#panel .ph{padding:12px 14px 8px;font-size:9px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;
  border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
#panel .ph button{background:0;border:0;color:var(--t3);cursor:pointer;font-size:14px;line-height:1;padding:2px}
#panel .ph button:hover{color:var(--t1)}
#panel .pg{padding:10px 14px}
#panel label{display:block;font-size:8px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin:10px 0 4px}
#panel label:first-child{margin-top:0}
#panel input,#panel textarea,#panel select{width:100%;padding:5px 8px;border-radius:4px;border:1px solid var(--b1);
  background:var(--s2);color:var(--t1);font-family:'IBM Plex Mono',monospace;font-size:11px;outline:none;transition:border .15s}
#panel input:focus,#panel textarea:focus,#panel select:focus{border-color:var(--green)}
#panel textarea{resize:vertical;min-height:48px}
.color-chips{display:flex;gap:4px;margin-top:4px}
.color-chip{width:24px;height:24px;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:all .15s}
.color-chip:hover{transform:scale(1.1)}
.color-chip.active{border-color:var(--t1);box-shadow:0 0 0 1px var(--bg)}
.pos-row{display:flex;gap:6px}
.pos-row input{width:50%}

/* Context menu */
#ctx-menu{position:fixed;z-index:30;background:var(--s1);border:1px solid var(--b2);border-radius:8px;
  padding:4px;min-width:160px;box-shadow:0 8px 30px rgba(0,0,0,.6);display:none;font-family:'IBM Plex Mono',monospace;font-size:11px}
#ctx-menu.visible{display:block}
#ctx-menu button{display:flex;align-items:center;gap:8px;width:100%;padding:6px 10px;border:0;border-radius:4px;
  background:0;color:var(--t1);cursor:pointer;font-family:inherit;font-size:inherit;text-align:left}
#ctx-menu button:hover{background:var(--s2)}
#ctx-menu button .shortcut{margin-left:auto;color:var(--t3);font-size:9px}
#ctx-menu button.danger{color:var(--ch)}
#ctx-menu .ctx-sep{height:1px;background:var(--b1);margin:3px 6px}

/* Command palette */
#cmd-palette{position:fixed;z-index:40;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);
  backdrop-filter:blur(4px);display:none;align-items:flex-start;justify-content:center;padding-top:20vh}
#cmd-palette.visible{display:flex}
#cmd-box{width:420px;background:var(--s1);border:1px solid var(--b2);border-radius:12px;
  box-shadow:0 16px 48px rgba(0,0,0,.6);overflow:hidden}
#cmd-input{width:100%;padding:14px 16px;border:0;border-bottom:1px solid var(--b1);
  background:0;color:var(--t1);font-family:'IBM Plex Mono',monospace;font-size:13px;outline:none}
#cmd-input::placeholder{color:var(--t3)}
#cmd-results{max-height:280px;overflow-y:auto}
#cmd-results button{display:flex;align-items:center;gap:10px;width:100%;padding:10px 16px;border:0;
  background:0;color:var(--t1);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:12px;text-align:left}
#cmd-results button:hover,#cmd-results button.active{background:var(--s2)}
#cmd-results button .cmd-key{margin-left:auto;color:var(--t3);font-size:10px;padding:1px 6px;
  border:1px solid var(--b1);border-radius:3px}
#cmd-results .cmd-icon{width:18px;color:var(--t3)}

/* Zoom indicator */
#zoom-badge{position:absolute;bottom:12px;left:12px;z-index:10;font-family:'IBM Plex Mono',monospace;
  font-size:10px;color:var(--t3);padding:3px 8px;background:rgba(11,11,18,.8);border-radius:4px;
  border:1px solid var(--b1);user-select:none;backdrop-filter:blur(4px)}

/* Help bar */
.help{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:10;
  font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3);
  padding:4px 12px;background:rgba(11,11,18,.8);border-radius:6px;border:1px solid var(--b1);
  backdrop-filter:blur(4px);white-space:nowrap;user-select:none}
.help b{color:var(--t2)}
.toast{position:absolute;bottom:48px;left:50%;transform:translateX(-50%) translateY(12px);z-index:20;
  font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gnh);padding:6px 16px;
  background:var(--gnl);border:1px solid var(--green);border-radius:6px;
  opacity:0;transition:opacity .2s,transform .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* GitHub login modal */
#gh-modal{position:fixed;z-index:50;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center}
#gh-modal.visible{display:flex}
#gh-modal-box{width:380px;background:var(--s1);border:1px solid var(--b2);border-radius:12px;
  padding:24px;box-shadow:0 16px 48px rgba(0,0,0,.6);font-family:'IBM Plex Mono',monospace}
#gh-modal-box h2{font-size:14px;font-weight:500;margin-bottom:4px;color:var(--t1)}
#gh-modal-box p{font-size:10px;color:var(--t3);line-height:1.5;margin-bottom:12px}
#gh-modal-box a{color:var(--th)}
#gh-modal-box input{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--b1);
  background:var(--s2);color:var(--t1);font-family:inherit;font-size:11px;outline:none;margin-bottom:10px}
#gh-modal-box input:focus{border-color:var(--green)}
.gh-btns{display:flex;gap:8px;justify-content:flex-end}
.gh-btns button{font-family:inherit;font-size:11px;padding:6px 14px;border-radius:6px;cursor:pointer;border:1px solid var(--b1);background:0;color:var(--t2)}
.gh-btns button.primary{border-color:var(--green);color:var(--gnh)}
.gh-btns button.primary:hover{background:var(--green);color:#fff}
.gh-btns button.danger{border-color:var(--coral);color:var(--ch)}
#gh-user{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:4px;cursor:pointer}
#gh-user:hover{color:var(--t2)}
#gh-user .avatar{width:16px;height:16px;border-radius:50%;border:1px solid var(--b1)}
</style>
</head>
<body>
<div class="grid"></div>

<header>
  <h1>Org architecture <span>— rent receivable factoring</span></h1>
  <div class="hgroup">
    <button class="tog on" id="t-deal" onclick="tog('deal')"><span class="d" style="background:var(--teal)"></span>Deal<span class="k">1</span></button>
    <button class="tog" id="t-esc" onclick="tog('esc')"><span class="d" style="background:var(--coral)"></span>Esc<span class="k">2</span></button>
    <button class="tog" id="t-data" onclick="tog('data')"><span class="d" style="background:var(--purple)"></span>Data<span class="k">3</span></button>
    <button class="tog" id="t-cash" onclick="tog('cash')"><span class="d" style="background:var(--green)"></span>Cash<span class="k">4</span></button>
    <div class="sep"></div>
    <span class="mode-label" id="mode-label">browse</span>
    <button class="hbtn" id="edit-toggle" onclick="toggleEdit()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Edit
    </button>
    <div class="sep" id="edit-tools" style="display:none"></div>
    <button class="hbtn primary" id="btn-add-node" onclick="addNode()" style="display:none">+ Node</button>
    <button class="hbtn" id="btn-add-conn" onclick="startAddConn()" style="display:none">+ Conn</button>
    <button class="hbtn" id="btn-undo" onclick="undo()" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 105.64-11.36L1 10"/></svg>
    </button>
    <button class="hbtn" id="btn-redo" onclick="redo()" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-5.64-11.36L23 10"/></svg>
    </button>
    <div class="sep" id="save-sep" style="display:none"></div>
    <button class="hbtn primary" id="btn-save" onclick="saveToStorage()" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save
    </button>
    <button class="hbtn primary" id="btn-publish" onclick="publish()" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>
      Publish
    </button>
    <div class="sep" id="cmd-sep" style="display:none"></div>
    <span id="gh-user" onclick="ghUserClick()" style="display:none"></span>
    <button class="hbtn" onclick="openCmd()" title="⌘K">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>
</header>

<div id="canvas-wrap">
  <svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>
  <div id="panel"></div>
  <div id="zoom-badge">100%</div>
  <div class="help" id="help-bar"><b>1-4</b> layers &nbsp; <b>A</b> all &nbsp; <b>0</b> none &nbsp; <b>E</b> edit &nbsp; <b>F</b> fit &nbsp; <b>⌘K</b> commands</div>
</div>

<div id="ctx-menu"></div>
<div id="cmd-palette">
  <div id="cmd-box">
    <input id="cmd-input" placeholder="Type a command..." autocomplete="off">
    <div id="cmd-results"></div>
  </div>
</div>

<div id="gh-modal">
  <div id="gh-modal-box">
    <h2 id="gh-modal-title">Connect to GitHub</h2>
    <div id="gh-modal-body"></div>
  </div>
</div>

<script>
// ============================================================
// DATA MODEL
// ============================================================
const NODES = [
  {id:"ceo", label:"CEO / Partnerships", sub:"PM acquisition · pricing · workouts\nInvestor relations · strategic direction", auth:"pricing, PM terms, write-offs", row:"human", type:"coral", x:60, y:74, w:310, h:100},
  {id:"credit", label:"Head of Credit", sub:"Underwriting policy · risk thresholds · exceptions\nPortfolio monitoring · concentration limits", auth:"approve/decline, limits, UW policy", row:"human", type:"coral", x:410, y:74, w:340, h:100},
  {id:"eng", label:"Head of Eng / Ops", sub:"Platform · agent orchestration\nPM integrations · compliance infra", auth:"system changes, deployments", row:"human", type:"coral", x:790, y:74, w:300, h:100},
  {id:"intake", label:"Intake Agent", badge:"LLM", sub:"Reads bids, leases, rent rolls\nExtracts structured deal data", io:"IN: PM docs → OUT: deal record", row:"agent", type:"purple", x:30, y:282, w:242, h:84},
  {id:"scoring", label:"Scoring Engine", badge:"RULES", sub:"Rent coverage · lease term · LTV\nPM track record · concentration", io:"IN: deal record → OUT: decision", row:"agent", type:"teal", x:306, y:282, w:242, h:84},
  {id:"servicing", label:"Servicing Engine", badge:"RULES", sub:"Rent-split calc · ACH · reconcile\nPayment tracking · UCC lifecycle", io:"IN: funded deal → OUT: payments", row:"agent", type:"teal", x:582, y:282, w:242, h:84},
  {id:"comms", label:"Comms Agent", badge:"LLM", sub:"PM status · payment confirms\nSupport triage · collections", io:"IN: events → OUT: messages", row:"agent", type:"purple", x:858, y:282, w:242, h:84},
  {id:"pm_adapt", label:"PM Platform Adapters", sub:"AppFolio · Buildium · Rentvine\nNormalized schema", row:"infra", type:"gray", x:30, y:560, w:240, h:72},
  {id:"ledger", label:"Deal Ledger", sub:"State · payments · UCC status\nTrue-sale audit trail", row:"infra", type:"gray", x:300, y:560, w:240, h:72},
  {id:"column", label:"Column Bank", sub:"ACH origination · receipt\nFBO accounts · ledger", row:"infra", type:"green", x:570, y:560, w:240, h:72},
  {id:"kb", label:"Knowledge Base", sub:"UW policy · PM profiles\nCompliance · templates", row:"infra", type:"gray", x:840, y:560, w:240, h:72},
  {id:"facility", label:"Credit Facility", sub:"Warehouse line", row:"cashflow", type:"green", x:50, y:684, w:160, h:44},
  {id:"contractor", label:"Contractor / PM", sub:"Receives repair funds", row:"cashflow", type:"green", x:1060, y:684, w:170, h:44},
];

const CONNECTIONS = [
  {from:"intake", to:"scoring", layer:"deal", color:"teal", style:"animated"},
  {from:"scoring", to:"servicing", layer:"deal", color:"teal", style:"animated"},
  {from:"servicing", to:"comms", layer:"deal", color:"teal", style:"animated"},
  {from:"scoring", to:"credit", layer:"esc", color:"coral", style:"dashed", label:"gray zone · >$25k"},
  {from:"servicing", to:"credit", layer:"esc", color:"coral", style:"dashed", label:"vacancy · 30d+ late"},
  {from:"comms", to:"ceo", layer:"esc", color:"coral", style:"dashed", label:"PM dispute"},
  {from:"pm_adapt", to:"intake", layer:"data", color:"purple", style:"animated-up"},
  {from:"ledger", to:"scoring", layer:"data", color:"purple", style:"animated-up"},
  {from:"ledger", to:"servicing", layer:"data", color:"purple", style:"animated-up"},
  {from:"kb", to:"comms", layer:"data", color:"purple", style:"animated-up"},
  {from:"kb", to:"scoring", layer:"data", color:"purple", style:"animated-up", opacity:.35},
  {from:"pm_adapt", to:"servicing", layer:"data", color:"purple", style:"animated-up", opacity:.35, label:"occupancy polls"},
  {from:"facility", to:"column", layer:"cash", color:"green", style:"animated", label:"$ Facility draw"},
  {from:"column", to:"contractor", layer:"cash", color:"green", style:"animated", label:"$ Disbursement"},
  {from:"servicing", to:"column", layer:"cash", color:"green", style:"dashed", label:"ACH instructions"},
];

const DEAL_STATES = [
  {label:"Received", x:46}, {label:"Scoring", x:164}, {label:"Approved", x:274},
  {label:"Funded", x:394}, {label:"Active", x:502}, {label:"Closed", x:700},
];

const COLORS = {
  coral: {fill:"#2c1810", stroke:"#D85A30", title:"#F0997B", auth:"#D85A30"},
  teal: {fill:"#0e3028", stroke:"#1D9E75", title:"#5DCAA5", io:"#1D9E75"},
  purple: {fill:"#1e1840", stroke:"#7F77DD", title:"#AFA9EC", io:"#7F77DD"},
  gray: {fill:"#1a1a26", stroke:"#40405a", title:"#9898aa"},
  green: {fill:"#152e08", stroke:"#639922", title:"#97C459"},
};

// ============================================================
// PERSISTENCE
// ============================================================
const STORAGE_KEY = "orgarch_save";
const DEFAULT_NODES = JSON.parse(JSON.stringify(NODES));
const DEFAULT_CONNECTIONS = JSON.parse(JSON.stringify(CONNECTIONS));

function saveToStorage() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({nodes:NODES, connections:CONNECTIONS, v:1}));
  showToast("Saved");
}
function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (d.nodes && d.connections) {
      NODES.length = 0; NODES.push(...d.nodes);
      CONNECTIONS.length = 0; CONNECTIONS.push(...d.connections);
      return true;
    }
  } catch(e) {}
  return false;
}
function resetToDefault() {
  if (!confirm("Reset to default layout? Your saved changes will be lost.")) return;
  NODES.length = 0; NODES.push(...JSON.parse(JSON.stringify(DEFAULT_NODES)));
  CONNECTIONS.length = 0; CONNECTIONS.push(...JSON.parse(JSON.stringify(DEFAULT_CONNECTIONS)));
  localStorage.removeItem(STORAGE_KEY);
  selected = null; closePanel(); render();
  showToast("Reset to default");
}
function showToast(msg) {
  let t = document.getElementById("toast");
  if (!t) { t = document.createElement("div"); t.id="toast"; document.getElementById("canvas-wrap").appendChild(t); }
  t.textContent = msg;
  t.className = "toast show";
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.className = "toast", 1800);
}

// ============================================================
// GITHUB INTEGRATION
// ============================================================
const GH_REPO = "ha101/system_design";
const GH_FILE = "index.html";
const GH_TOKEN_KEY = "orgarch_gh_token";
const GH_USER_KEY = "orgarch_gh_user";

function getGHToken() { return localStorage.getItem(GH_TOKEN_KEY); }
function getGHUser() { try { return JSON.parse(localStorage.getItem(GH_USER_KEY)); } catch(e) { return null; } }

function initGHUser() {
  const user = getGHUser();
  const el = document.getElementById("gh-user");
  if (user) {
    el.innerHTML = `<img class="avatar" src="${user.avatar}" alt="">${user.login}`;
    el.style.display = "flex";
  } else {
    el.style.display = "none";
  }
}

function ghUserClick() {
  const user = getGHUser();
  if (!user) { showGHLogin(); return; }
  const modal = document.getElementById("gh-modal");
  const body = document.getElementById("gh-modal-body");
  document.getElementById("gh-modal-title").textContent = "GitHub";
  body.innerHTML = `
    <p>Connected as <strong style="color:var(--t1)">${user.login}</strong></p>
    <div class="gh-btns">
      <button class="danger" onclick="ghLogout()">Disconnect</button>
      <button onclick="closeGHModal()">Close</button>
    </div>`;
  modal.classList.add("visible");
}

function showGHLogin() {
  const modal = document.getElementById("gh-modal");
  const body = document.getElementById("gh-modal-body");
  document.getElementById("gh-modal-title").textContent = "Connect to GitHub";
  body.innerHTML = `
    <p>Enter a <a href="https://github.com/settings/tokens?type=beta" target="_blank">fine-grained personal access token</a> with <strong style="color:var(--t1)">Contents: Read and write</strong> permission for the <strong style="color:var(--t1)">${GH_REPO}</strong> repo.</p>
    <input id="gh-token-input" type="password" placeholder="github_pat_..." autocomplete="off">
    <div id="gh-login-err" style="color:var(--ch);font-size:10px;margin-bottom:8px;display:none"></div>
    <div class="gh-btns">
      <button onclick="closeGHModal()">Cancel</button>
      <button class="primary" onclick="ghConnect()">Connect</button>
    </div>`;
  modal.classList.add("visible");
  setTimeout(() => document.getElementById("gh-token-input").focus(), 50);
}

function closeGHModal() { document.getElementById("gh-modal").classList.remove("visible"); }

async function ghConnect() {
  const input = document.getElementById("gh-token-input");
  const err = document.getElementById("gh-login-err");
  const token = input.value.trim();
  if (!token) { err.textContent = "Token required"; err.style.display = "block"; return; }
  err.style.display = "none";
  try {
    const res = await fetch("https://api.github.com/user", {headers:{"Authorization":"Bearer "+token}});
    if (!res.ok) throw new Error("Invalid token");
    const user = await res.json();
    // Verify repo access
    const repoRes = await fetch(`https://api.github.com/repos/${GH_REPO}`, {headers:{"Authorization":"Bearer "+token}});
    if (!repoRes.ok) throw new Error("No access to " + GH_REPO);
    localStorage.setItem(GH_TOKEN_KEY, token);
    localStorage.setItem(GH_USER_KEY, JSON.stringify({login:user.login, avatar:user.avatar_url}));
    closeGHModal();
    initGHUser();
    showToast("Connected as " + user.login);
  } catch(e) {
    err.textContent = e.message;
    err.style.display = "block";
  }
}

function ghLogout() {
  localStorage.removeItem(GH_TOKEN_KEY);
  localStorage.removeItem(GH_USER_KEY);
  closeGHModal();
  initGHUser();
  showToast("Disconnected");
}

async function publish() {
  const token = getGHToken();
  if (!token) { showGHLogin(); return; }

  showToast("Publishing...");
  try {
    // Get current file content + SHA
    const fileRes = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
      headers:{"Authorization":"Bearer "+token}
    });
    if (!fileRes.ok) throw new Error("Failed to read repo");
    const fileData = await fileRes.json();
    const currentContent = atob(fileData.content.replace(/\n/g, ""));

    // Replace NODES and CONNECTIONS arrays in the file
    const newContent = replaceDataInHTML(currentContent, NODES, CONNECTIONS);

    // Commit
    const commitRes = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
      method: "PUT",
      headers: {"Authorization":"Bearer "+token, "Content-Type":"application/json"},
      body: JSON.stringify({
        message: "Update org architecture layout",
        content: btoa(unescape(encodeURIComponent(newContent))),
        sha: fileData.sha
      })
    });
    if (!commitRes.ok) {
      const errData = await commitRes.json();
      throw new Error(errData.message || "Commit failed");
    }
    showToast("Published — site will update in ~1 min");
  } catch(e) {
    if (e.message.includes("Bad credentials")) {
      localStorage.removeItem(GH_TOKEN_KEY);
      localStorage.removeItem(GH_USER_KEY);
      initGHUser();
      showGHLogin();
      return;
    }
    showToast("Error: " + e.message);
  }
}

function replaceDataInHTML(html, nodes, conns) {
  // Replace the NODES array
  const nodesStr = JSON.stringify(nodes, null, 2);
  html = html.replace(
    /const NODES = \[[\s\S]*?\n\];/,
    "const NODES = " + nodesStr + ";"
  );
  // Replace the CONNECTIONS array
  const connsStr = JSON.stringify(conns, null, 2);
  html = html.replace(
    /const CONNECTIONS = \[[\s\S]*?\n\];/,
    "const CONNECTIONS = " + connsStr + ";"
  );
  return html;
}

const layers = {deal:true, esc:false, data:false, cash:false};
let editing = false;

let zoom = 1, panX = 0, panY = 0;

// Undo
const undoStack = [], redoStack = [];
function snapshot() {
  undoStack.push({n:JSON.parse(JSON.stringify(NODES)), c:JSON.parse(JSON.stringify(CONNECTIONS))});
  redoStack.length = 0;
  if (undoStack.length > 50) undoStack.shift();
}
function undo() {
  if (!undoStack.length) return;
  redoStack.push({n:JSON.parse(JSON.stringify(NODES)), c:JSON.parse(JSON.stringify(CONNECTIONS))});
  const s = undoStack.pop();
  NODES.length = 0; NODES.push(...s.n);
  CONNECTIONS.length = 0; CONNECTIONS.push(...s.c);
  selected = null; render();
}
function redo() {
  if (!redoStack.length) return;
  undoStack.push({n:JSON.parse(JSON.stringify(NODES)), c:JSON.parse(JSON.stringify(CONNECTIONS))});
  const s = redoStack.pop();
  NODES.length = 0; NODES.push(...s.n);
  CONNECTIONS.length = 0; CONNECTIONS.push(...s.c);
  selected = null; render();
}

// ============================================================
// HELPERS

function esc(s) { return (s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
function getNode(id) { return NODES.find(n => n.id === id); }
function nodeCenter(id) {
  const n = getNode(id);
  return {x:n.x+n.w/2, y:n.y+n.h/2, top:n.y, bot:n.y+n.h, left:n.x, right:n.x+n.w};
}
function connPts(fromId, toId) {
  const f = nodeCenter(fromId), t = nodeCenter(toId);
  let fx,fy,tx,ty;
  if (t.top > f.bot+20) { fx=f.x; fy=f.bot; tx=t.x; ty=t.top; }
  else if (f.top > t.bot+20) { fx=f.x; fy=f.top; tx=t.x; ty=t.bot; }
  else { fx=f.right; fy=f.y; tx=t.left; ty=t.y; }
  return {fx,fy,tx,ty};
}
function svgPt(e) {
  const svg = document.getElementById("canvas");
  const r = svg.getBoundingClientRect();
  const vb = svg.viewBox.baseVal;
  return {
    x: (e.clientX - r.left) / r.width * vb.width + vb.x,
    y: (e.clientY - r.top) / r.height * vb.height + vb.y
  };
}

function render() {
  const svg = document.getElementById("canvas");
  updateViewBox();

  const markerDefs = ['teal','coral','purple','green'].map(c =>

  let html = `<defs>${markerDefs}</defs>`;

  // Zone backgrounds
  html += `<rect class="zbg${layers.esc?'':' off'}" id="z-esc" x="0" y="134" width="${W}" height="112" fill="#D85A30" opacity=".015"/>`;

  html += `<rect class="zbg${layers.cash?'':' off'}" id="z-cash" x="0" y="670" width="${W}" height="86" fill="#639922" opacity=".02"/>`;

  html += `<text x="30" y="552" fill="#50506e" font-size="9" letter-spacing=".1em">INFRASTRUCTURE</text>`;

  // Connections per layer
  const layerHTML = {deal:"", esc:"", data:"", cash:""};
  CONNECTIONS.forEach((cn, ci) => {
    const {fx,fy,tx,ty} = connPts(cn.from, cn.to);
    const c = COLORS[cn.color];
    const op = cn.opacity || 1;
    const isSel = selected && selected.type==='conn' && selected.index===ci;
    let cls = cn.style==="animated"?"ar":cn.style==="animated-up"?"au":"";
    let sw = cn.style==="animated-up"?0.8:cn.style==="dashed"?0.8:1.5;
    let dash = cn.style==="dashed"?'stroke-dasharray="4 4"':"";
    let g = `<g data-conn="${ci}" class="conn-g${isSel?' selected':''}" style="cursor:pointer">`;
    g += `<line x1="${fx}" y1="${fy}" x2="${tx}" y2="${ty}" stroke="transparent" stroke-width="14"/>`;
    g += `<line x1="${fx}" y1="${fy}" x2="${tx}" y2="${ty}" stroke="${c.stroke}" stroke-width="${isSel?3:sw}" class="${cls}" ${dash} opacity="${op}" marker-end="url(#m-${cn.color})"/>`;
    if (cn.label) {
      const mx=fx+(tx-fx)/2, my=fy+(ty-fy)/2;
      g += `<rect x="${mx-cn.label.length*3.2-8}" y="${my-10}" width="${cn.label.length*6.5+16}" height="16" rx="8" fill="#1c1c28" stroke="${isSel?'#639922':'#24243a'}" stroke-width="${isSel?1.5:.5}"/>`;
      g += `<text x="${mx}" y="${my+2}" fill="#FAC775" font-size="8" text-anchor="middle">${cn.label}</text>`;
    }
    g += `</g>`;
    layerHTML[cn.layer] += g;
  });

  // Deal states (static decoration in deal layer)
  let dealExtra = `<text x="30" y="378" fill="#1D9E75" font-size="9" letter-spacing=".06em" opacity=".5">DEAL STATES</text>`;
  DEAL_STATES.forEach((s,i) => {
    const w = s.label.length*7+16;
    dealExtra += `<rect x="${s.x}" y="390" width="${w}" height="20" rx="10" fill="#0e3028" stroke="#1D9E75" stroke-width=".5"/>`;
    dealExtra += `<text x="${s.x+w/2}" y="404" fill="#5DCAA5" font-size="9" text-anchor="middle" font-weight="500">${s.label}</text>`;
    if (i<DEAL_STATES.length-1) {
      const nx = DEAL_STATES[i+1].x;
      dealExtra += `<line x1="${s.x+w}" y1="400" x2="${nx}" y2="400" stroke="#1D9E75" stroke-width=".4" opacity=".35" marker-end="url(#m-teal)"/>`;
    }
  });
  dealExtra += `<rect x="200" y="434" width="104" height="20" rx="10" fill="#2c1810" stroke="#D85A30" stroke-width=".5"/>`;
  dealExtra += `<text x="252" y="448" fill="#F0997B" font-size="8" text-anchor="middle" font-weight="500">Human review</text>`;
  dealExtra += `<rect x="540" y="434" width="44" height="20" rx="10" fill="#1c1c28" stroke="#BA7517" stroke-width=".5"/>`;
  dealExtra += `<text x="562" y="448" fill="#FAC775" font-size="8" text-anchor="middle" font-weight="500">Late</text>`;
  dealExtra += `<rect x="614" y="434" width="66" height="20" rx="10" fill="#2c1810" stroke="#D85A30" stroke-width=".5"/>`;
  dealExtra += `<text x="647" y="448" fill="#F0997B" font-size="8" text-anchor="middle" font-weight="500">Workout</text>`;
  dealExtra += `<line x1="584" y1="444" x2="612" y2="444" stroke="#D85A30" stroke-width=".3" opacity=".4" marker-end="url(#m-coral)"/>`;
  layerHTML.deal += dealExtra;

  layerHTML.esc += `<rect x="840" y="148" width="236" height="30" rx="6" fill="#13131c" stroke="#D85A30" stroke-width=".5" opacity=".6"/>`;
  layerHTML.esc += `<text x="858" y="162" fill="#F0997B" font-size="9" font-weight="500">Principle</text>`;
  layerHTML.esc += `<text x="858" y="174" fill="#50506e" font-size="8">No human monitors. Agents detect, package, route.</text>`;

  layerHTML.cash += `<rect x="620" y="740" width="160" height="16" rx="8" fill="#13131c" stroke="#639922" stroke-width=".5" opacity=".5"/>`;
  layerHTML.cash += `<text x="700" y="752" fill="#97C459" font-size="8" text-anchor="middle">$ Factor discount = revenue</text>`;

  // Nodes
  let nodesHTML = "";
  NODES.forEach((n, ni) => {
    const c = COLORS[n.type];
    const isSel = selected && selected.type==='node' && selected.index===ni;
    let g = `<g data-node="${ni}" class="node-g${isSel?' selected':''}">`;
    if (isSel) {
      g += `<rect class="sel-border" x="${n.x-1}" y="${n.y-1}" width="${n.w+2}" height="${n.h+2}" rx="7" fill="none" stroke="#639922" stroke-width="1.5"/>`;
    }
    g += `<rect x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}" rx="6" fill="${c.fill}" stroke="${isSel?'#639922':c.stroke}" stroke-width="${isSel?1.5:.5}"/>`;
    g += `<text x="${n.x+18}" y="${n.y+24}" fill="${c.title}" font-size="12" font-weight="500">${esc(n.label)}</text>`;
    if (n.badge) g += `<text x="${n.x+18+n.label.length*7.5}" y="${n.y+24}" fill="#50506e" font-size="9">${n.badge}</text>`;
    (n.sub||"").split("\n").forEach((l,i) => { g += `<text x="${n.x+18}" y="${n.y+42+i*16}" fill="#50506e" font-size="10">${esc(l)}</text>`; });
    if (n.auth) g += `<text x="${n.x+18}" y="${n.y+n.h-10}" fill="${c.auth||c.stroke}" font-size="8" opacity=".5">AUTHORITY  ${esc(n.auth)}</text>`;
    if (n.io) g += `<text x="${n.x+18}" y="${n.y+n.h-6}" fill="${c.io||c.stroke}" font-size="8" opacity=".5">${esc(n.io)}</text>`;
    g += `</g>`;
    nodesHTML += g;
  });

  // Assemble layers
  for (const k of ["deal","esc","data","cash"]) {
    html += `<g class="lay${layers[k]?'':' off'}" id="l-${k}">${layerHTML[k]}</g>`;
  }
  html += nodesHTML;

  svg.innerHTML = html;
  syncToggles();
}

function renderCanvas() { render(); }


function updateViewBox() {
  const svg = document.getElementById("canvas");
  const vw = W / zoom, vh = H / zoom;
  svg.setAttribute("viewBox", `${panX} ${panY} ${vw} ${vh}`);
  document.getElementById("zoom-badge").textContent = Math.round(zoom * 100) + "%";
}

function fitView() {
  zoom = 1; panX = 0; panY = 0;

// ============================================================
// LAYER TOGGLES
// ============================================================
function syncToggles() {
  for (const k in layers) {
    const b = document.getElementById("t-"+k);
    if (b) b.classList.toggle("on", layers[k]);
    const l = document.getElementById("l-"+k);
    if (l) l.classList.toggle("off", !layers[k]);
    const zm = {esc:"z-esc",data:"z-data",cash:"z-cash"};
    if (zm[k]) {
      const el = document.getElementById(zm[k]);
      if (el) el.classList.toggle("off", !layers[k]);
    }
  }
}
function tog(k) { layers[k] = !layers[k]; syncToggles(); }

function updNode(ni, key, val) { NODES[ni][key] = val; renderCanvas(); }

// ============================================================
// CANVAS INTERACTIONS
// ============================================================
let dragging = null; // {ni, startPt, origX, origY, g}
let panning = false, panStart = null, panOrigX, panOrigY;

document.getElementById("canvas-wrap").addEventListener("mousedown", e => {
  if (e.target.closest("#panel")) return;
  const svg = document.getElementById("canvas");
  const nodeG = e.target.closest("[data-node]");
  const connG = e.target.closest("[data-conn]");

  closeCtx();

  // Connection creation mode
  if (addingConn && editing && nodeG) {
    const ni = parseInt(nodeG.dataset.node);
    if (connFrom === null) {
      connFrom = ni;
      selected = {type:'node', index:ni};
      render();
    } else if (connFrom !== ni) {
      snapshot();
      CONNECTIONS.push({from:NODES[connFrom].id, to:NODES[ni].id, layer:"deal", color:"teal", style:"animated"});
      selected = {type:'conn', index:CONNECTIONS.length-1};
      addingConn = false; connFrom = null;
      document.getElementById("btn-add-conn").classList.remove("active");
      render(); updatePanel();
    }
    return;
  }

  if (editing && nodeG) {
    const ni = parseInt(nodeG.dataset.node);
    selected = {type:'node', index:ni};
    const pt = svgPt(e);
    dragging = {ni, startPt:pt, origX:NODES[ni].x, origY:NODES[ni].y, g:nodeG, moved:false};
    render(); updatePanel();
    // Re-grab the group after render
    dragging.g = svg.querySelector(`[data-node="${ni}"]`);
    e.preventDefault();
  } else if (editing && connG) {
    selected = {type:'conn', index:parseInt(connG.dataset.conn)};
    render(); updatePanel();
    e.preventDefault();
  } else if (nodeG && !editing) {
    // Browse mode: select for info
    selected = {type:'node', index:parseInt(nodeG.dataset.node)};
    render(); updatePanel();
  } else if (!nodeG && !connG) {
    // Pan or deselect
    if (e.button === 0 && !e.target.closest("#panel")) {
      if (selected) { selected = null; closePanel(); render(); }
      panning = true;
      panStart = {x:e.clientX, y:e.clientY};
      panOrigX = panX; panOrigY = panY;
      document.getElementById("canvas-wrap").classList.add("panning");
    }
  }
});

document.addEventListener("mousemove", e => {
  if (dragging) {
    const pt = svgPt(e);
    const dx = pt.x - dragging.startPt.x;
    const dy = pt.y - dragging.startPt.y;
    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) dragging.moved = true;
    if (dragging.moved && dragging.g) {
      dragging.g.setAttribute("transform", `translate(${dx},${dy})`);
    }
    e.preventDefault();
  }
  if (panning && panStart) {
    const svg = document.getElementById("canvas");
    const r = svg.getBoundingClientRect();
    const vw = W / zoom, vh = H / zoom;
    const dx = (e.clientX - panStart.x) / r.width * vw;
    const dy = (e.clientY - panStart.y) / r.height * vh;
    panX = panOrigX - dx;
    panY = panOrigY - dy;
    updateViewBox();
  }
});

document.addEventListener("mouseup", e => {
  if (dragging) {
    if (dragging.moved) {
      snapshot();
      const pt = svgPt(e);
      const dx = pt.x - dragging.startPt.x;
      const dy = pt.y - dragging.startPt.y;
      NODES[dragging.ni].x = Math.round(dragging.origX + dx);
      NODES[dragging.ni].y = Math.round(dragging.origY + dy);
      render();
    }
    dragging = null;
  }
  if (panning) {
    panning = false;
    panStart = null;
    document.getElementById("canvas-wrap").classList.remove("panning");
  }
});

// Double-click
document.getElementById("canvas-wrap").addEventListener("dblclick", e => {
  if (!editing) { toggleEdit(); return; }
  const nodeG = e.target.closest("[data-node]");
  const connG = e.target.closest("[data-conn]");
  if (nodeG) {
    const ni = parseInt(nodeG.dataset.node);
    selected = {type:'node', index:ni};
    render();
  } else if (connG) {
    const ci = parseInt(connG.dataset.conn);
    selected = {type:'conn', index:ci};
    render();
    // Inline label edit
    const cn = CONNECTIONS[ci];
    const {fx,fy,tx,ty} = connPts(cn.from, cn.to);
    const mx = fx+(tx-fx)/2, my = fy+(ty-fy)/2;
    inlineEdit(ci, mx, my);
  }
});

// Zoom
document.getElementById("canvas-wrap").addEventListener("wheel", e => {
  e.preventDefault();
  const pt = svgPt(e);
  const oldZoom = zoom;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  zoom = Math.max(0.3, Math.min(4, zoom * delta));
  // Zoom toward cursor
  panX = pt.x - (pt.x - panX) * (oldZoom / zoom);
  panY = pt.y - (pt.y - panY) * (oldZoom / zoom);
  updateViewBox();
}, {passive:false});

// ============================================================
// INLINE LABEL EDIT
// ============================================================
function inlineEdit(ci, svgX, svgY) {
  const old = document.getElementById("inline-edit");
  if (old) old.remove();
  const cn = CONNECTIONS[ci];
  const svg = document.getElementById("canvas");
  const r = svg.getBoundingClientRect();
  const vb = svg.viewBox.baseVal;
  const sx = r.left + ((svgX - vb.x) / vb.width) * r.width;
  const sy = r.top + ((svgY - vb.y) / vb.height) * r.height;
  const wrap = document.getElementById("canvas-wrap");
  const wr = wrap.getBoundingClientRect();

  const input = document.createElement("input");
  input.id = "inline-edit";
  input.value = cn.label || "";
  input.placeholder = "Label...";
  input.style.cssText = `position:absolute;z-index:25;left:${sx-wr.left-80}px;top:${sy-wr.top-12}px;
    width:160px;padding:5px 8px;border-radius:6px;border:1px solid #639922;
    background:#13131c;color:#e0e0ea;font-family:'IBM Plex Mono',monospace;font-size:11px;
    text-align:center;outline:none;box-shadow:0 4px 16px rgba(0,0,0,.5)`;
  function commit() { snapshot(); cn.label = input.value||undefined; input.remove(); render(); }
  input.addEventListener("keydown", e => { if(e.key==="Enter")commit(); if(e.key==="Escape"){input.remove();} e.stopPropagation(); });
  input.addEventListener("blur", commit);
  wrap.appendChild(input);
  input.focus(); input.select();
}

// ============================================================
// ACTIONS
// ============================================================
function addNode() {
  snapshot();
  const cx = panX + W/zoom/2 - 100, cy = panY + H/zoom/2 - 30;
  NODES.push({id:"n_"+Date.now(), label:"New Node", sub:"Description", type:"gray", x:Math.round(cx), y:Math.round(cy), w:200, h:60});
  selected = {type:'node', index:NODES.length-1};
  render(); updatePanel();
}

function startAddConn() {
  addingConn = !addingConn;
  connFrom = null;
  document.getElementById("btn-add-conn").classList.toggle("active", addingConn);
}

function deleteSelected() {
  if (!selected) return;
  snapshot();
  if (selected.type === 'node') {
    const id = NODES[selected.index].id;
    NODES.splice(selected.index, 1);
    for (let i=CONNECTIONS.length-1;i>=0;i--) {
      if (CONNECTIONS[i].from===id||CONNECTIONS[i].to===id) CONNECTIONS.splice(i,1);
    }
  } else {
    CONNECTIONS.splice(selected.index, 1);
  }
  selected = null; closePanel(); render();
}

function duplicateNode() {
  if (!selected || selected.type!=='node') return;
  snapshot();
  const src = NODES[selected.index];
  const n = JSON.parse(JSON.stringify(src));
  n.id = "n_"+Date.now();
  n.x += 20; n.y += 20;
  NODES.push(n);
  selected = {type:'node', index:NODES.length-1};
  render(); updatePanel();
}

// ============================================================
// CONTEXT MENU
// ============================================================
function closeCtx() { document.getElementById("ctx-menu").classList.remove("visible"); }

document.getElementById("canvas-wrap").addEventListener("contextmenu", e => {
  if (e.target.closest("#panel")) return;
  e.preventDefault();
  const nodeG = e.target.closest("[data-node]");
  const connG = e.target.closest("[data-conn]");
  const menu = document.getElementById("ctx-menu");
  let html = "";

  if (nodeG && editing) {
    const ni = parseInt(nodeG.dataset.node);
    selected = {type:'node', index:ni}; render();
    html = `
      <button onclick="closeCtx();showNodePanel(${ni})">Edit properties<span class="shortcut">Dbl-click</span></button>
      <button onclick="closeCtx();duplicateNode()">Duplicate<span class="shortcut">⌘D</span></button>
      <div class="ctx-sep"></div>
      <button class="danger" onclick="closeCtx();deleteSelected()">Delete<span class="shortcut">⌫</span></button>`;
  } else if (connG && editing) {
    const ci = parseInt(connG.dataset.conn);
    selected = {type:'conn', index:ci}; render();
    const cn = CONNECTIONS[ci];
    const {fx,fy,tx,ty} = connPts(cn.from, cn.to);
    const mx=fx+(tx-fx)/2, my=fy+(ty-fy)/2;
    html = `
      <button onclick="closeCtx();inlineEdit(${ci},${mx},${my})">Edit label</button>
      <button onclick="closeCtx();showConnPanel(${ci})">Properties</button>
      <div class="ctx-sep"></div>
      <button class="danger" onclick="closeCtx();deleteSelected()">Delete<span class="shortcut">⌫</span></button>`;
  } else if (editing) {
    html = `
      <button onclick="closeCtx();addNode()">Add node<span class="shortcut">N</span></button>
      <button onclick="closeCtx();startAddConn()">Add connection</button>
      <div class="ctx-sep"></div>
      <button onclick="closeCtx();fitView()">Fit view<span class="shortcut">F</span></button>`;
  } else {
    html = `
      <button onclick="closeCtx();toggleEdit()">Enter edit mode<span class="shortcut">E</span></button>
      <div class="ctx-sep"></div>
      <button onclick="closeCtx();fitView()">Fit view<span class="shortcut">F</span></button>`;
  }
  menu.innerHTML = html;
  menu.style.left = e.clientX + "px";
  menu.style.top = e.clientY + "px";
  menu.classList.add("visible");
});

document.addEventListener("click", e => { if (!e.target.closest("#ctx-menu")) closeCtx(); });

// ============================================================
// COMMAND PALETTE
// ============================================================
const COMMANDS = [
  {name:"Toggle deal flow", key:"1", fn:()=>tog('deal')},
  {name:"Toggle escalation", key:"2", fn:()=>tog('esc')},
  {name:"Toggle data flow", key:"3", fn:()=>tog('data')},
  {name:"Toggle cashflow", key:"4", fn:()=>tog('cash')},
  {name:"Show all layers", key:"A", fn:()=>{layers.deal=layers.esc=layers.data=layers.cash=true;syncToggles()}},
  {name:"Hide all layers", key:"0", fn:()=>{layers.deal=layers.esc=layers.data=layers.cash=false;syncToggles()}},
  {name:"Toggle edit mode", key:"E", fn:toggleEdit},
  {name:"Fit view", key:"F", fn:fitView},
  {name:"Add node", key:"N", fn:()=>{if(!editing)toggleEdit();addNode()}},
  {name:"Delete selected", key:"⌫", fn:deleteSelected},
  {name:"Duplicate node", key:"⌘D", fn:duplicateNode},
  {name:"Undo", key:"⌘Z", fn:undo},
  {name:"Redo", key:"⌘⇧Z", fn:redo},
  {name:"Save changes", key:"⌘S", fn:saveToStorage},
  {name:"Publish to GitHub", key:"⌘⇧S", fn:publish},
  {name:"Connect to GitHub", key:"", fn:showGHLogin},
  {name:"Reset to default", key:"", fn:resetToDefault},
];

let cmdActive = -1;
function openCmd() {
  const pal = document.getElementById("cmd-palette");
  pal.classList.add("visible");
  const input = document.getElementById("cmd-input");
  input.value = "";
  cmdActive = -1;
  renderCmdResults("");
  setTimeout(() => input.focus(), 50);
}
function closeCmd() {
  document.getElementById("cmd-palette").classList.remove("visible");
}
function renderCmdResults(q) {
  const results = document.getElementById("cmd-results");
  const filtered = q ? COMMANDS.filter(c => c.name.toLowerCase().includes(q.toLowerCase())) : COMMANDS;
  results.innerHTML = filtered.map((c,i) =>
    `<button data-ci="${i}" class="${i===cmdActive?'active':''}" onclick="runCmd(${COMMANDS.indexOf(c)})">`+
    `<span class="cmd-icon">›</span>${c.name}<span class="cmd-key">${c.key}</span></button>`
  ).join("");
}
function runCmd(i) { closeCmd(); COMMANDS[i].fn(); }

document.getElementById("cmd-input").addEventListener("input", e => {
  cmdActive = -1;
  renderCmdResults(e.target.value);
});
document.getElementById("cmd-input").addEventListener("keydown", e => {
  const btns = document.querySelectorAll("#cmd-results button");
  if (e.key === "ArrowDown") { cmdActive = Math.min(cmdActive+1, btns.length-1); e.preventDefault(); }
  else if (e.key === "ArrowUp") { cmdActive = Math.max(cmdActive-1, 0); e.preventDefault(); }
  else if (e.key === "Enter" && btns[cmdActive]) { btns[cmdActive].click(); return; }
  else if (e.key === "Escape") { closeCmd(); return; }
  else return;
  btns.forEach((b,i) => b.classList.toggle("active", i===cmdActive));
});
document.getElementById("cmd-palette").addEventListener("click", e => {
  if (e.target === document.getElementById("cmd-palette")) closeCmd();
});

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener("keydown", e => {
  if (document.getElementById("cmd-palette").classList.contains("visible")) return;
  if (e.target.closest("input,textarea,select")) return;

  // Cmd+Shift+S = publish, Cmd+S = save local
  if ((e.metaKey||e.ctrlKey) && e.key==="s" && e.shiftKey) { e.preventDefault(); publish(); return; }
  if ((e.metaKey||e.ctrlKey) && e.key==="s") { e.preventDefault(); saveToStorage(); return; }
  // Cmd+K
  if ((e.metaKey||e.ctrlKey) && e.key==="k") { e.preventDefault(); openCmd(); return; }
  // Cmd+Z
  if ((e.metaKey||e.ctrlKey) && e.key==="z" && !e.shiftKey) { e.preventDefault(); undo(); return; }
  if ((e.metaKey||e.ctrlKey) && e.key==="z" && e.shiftKey) { e.preventDefault(); redo(); return; }
  // Cmd+D
  if ((e.metaKey||e.ctrlKey) && e.key==="d") { e.preventDefault(); duplicateNode(); return; }

  if (editing) {
    if (e.key==="Escape") { if (addingConn) { addingConn=false; connFrom=null; document.getElementById("btn-add-conn").classList.remove("active"); } else { toggleEdit(); } }
    if (e.key==="Delete"||e.key==="Backspace") deleteSelected();
    if (e.key.toLowerCase()==="n") addNode();
  } else {
    if (e.key==="1") tog('deal');
    if (e.key==="2") tog('esc');
    if (e.key==="3") tog('data');
    if (e.key==="4") tog('cash');
    if (e.key.toLowerCase()==="a") { layers.deal=layers.esc=layers.data=layers.cash=true; syncToggles(); }
    if (e.key==="0") { layers.deal=layers.esc=layers.data=layers.cash=false; syncToggles(); }
    if (e.key.toLowerCase()==="e") toggleEdit();
  }
  if (e.key.toLowerCase()==="f" && !e.metaKey && !e.ctrlKey) fitView();
});

// ============================================================
// INIT
// ============================================================
loadFromStorage();
render();
initGHUser();
</script>
</body>
